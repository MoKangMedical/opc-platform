services:
  - type: web
    name: opc-platform
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        value: "sqlite:///./opc_platform.db"
    autoDeploy: true
    healthCheckPath: /api/health
    plan: free
