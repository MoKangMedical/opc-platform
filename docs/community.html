.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(0,214,143,.06),transparent 70%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(78,168,222,.03),transparent 60%)}
.hero-c{text-align:center;max-width:860px;position:relative;z-index:1}
.badge{display:inline-flex;align-items:center;gap:8px;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--green);background:rgba(0,214,143,.08);border:1px solid rgba(0,214,143,.15);padding:8px 20px;border-radius:100px;margin-bottom:28px;animation:fu .8s var(--e) both}
.ht{font-family:var(--fd);font-size:clamp(2.5rem,5.5vw,4rem);font-weight:700;line-height:1.08;margin-bottom:24px;letter-spacing:-.03em;animation:fu .8s var(--e) .1s both}
.ht .g{background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd{font-size:1.15rem;color:var(--t2);max-width:640px;margin:0 auto 48px;line-height:1.7;animation:fu .8s var(--e) .2s both}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;max-width:720px;margin:0 auto 48px;animation:fu .8s var(--e) .3s both}
.sc{background:var(--bg2);padding:28px 20px;text-align:center;transition:background .3s}
.sc:hover{background:var(--card2)}
.sn{font-family:var(--fd);font-size:2.2rem;font-weight:700;letter-spacing:-.03em;margin-bottom:4px}
.sn.g{color:var(--green)}.sn.b{color:var(--blue)}.sn.p{color:var(--purple)}.sn.o{color:var(--orange)}
.sl{font-size:.8rem;color:var(--t3);font-weight:500}
.sh{margin:80px 0 40px;text-align:center}
.sh-tag{font-size:.72rem;letter-spacing:3px;text-transform:uppercase;color:var(--green);margin-bottom:12px}
.sh-title{font-family:var(--fd);font-size:2rem;font-weight:700;margin-bottom:8px}
.sh-desc{color:var(--t2);max-width:480px;margin:0 auto}
/* Community Posts */
.post-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px}
.post{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;transition:all .4s var(--e)}
.post:hover{border-color:var(--border2);transform:translateY(-4px)}
.post-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.post-ava{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.post-name{font-weight:600;font-size:.95rem}
.post-time{font-size:.75rem;color:var(--t3)}
.post-title{font-family:var(--fd);font-size:1.1rem;font-weight:600;margin-bottom:8px}
.post-desc{font-size:.88rem;color:var(--t2);line-height:1.6;margin-bottom:16px}
.post-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pt{font-size:.72rem;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.04);color:var(--t3);border:1px solid var(--border)}
.post-stats{display:flex;gap:16px;font-size:.82rem;color:var(--t3)}
.ps{display:flex;align-items:center;gap:4px}
/* Members */
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.member{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;transition:all .3s var(--e)}
.member:hover{border-color:var(--border2);transform:translateY(-2px)}
.member-ava{width:60px;height:60px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:2rem}
.member-name{font-weight:600;margin-bottom:4px}
.member-role{font-size:.82rem;color:var(--t2);margin-bottom:8px}
.member-tags{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.mt{font-size:.68rem;padding:2px 8px;border-radius:4px;background:rgba(0,214,143,.08);color:var(--green)}
/* Events */
.event-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.event{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;transition:all .4s var(--e)}
.event:hover{border-color:var(--border2);transform:translateY(-4px)}
.event-date{font-family:var(--fd);font-size:2rem;font-weight:700;color:var(--green);margin-bottom:4px}
.event-month{font-size:.82rem;color:var(--t3);margin-bottom:12px}
.event-title{font-family:var(--fd);font-size:1.1rem;font-weight:600;margin-bottom:8px}
.event-desc{font-size:.88rem;color:var(--t2);line-height:1.6;margin-bottom:16px}
.event-meta{display:flex;gap:12px;font-size:.78rem;color:var(--t3)}
footer{border-top:1px solid var(--border);padding:48px 0;position:relative;z-index:1}
.ft-i{max-width:1280px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between}
.ft-t{color:var(--t3);font-size:.82rem}
.ft-l{display:flex;gap:24px}
.ft-l a{color:var(--t3);text-decoration:none;font-size:.82rem;transition:color .2s}
.ft-l a:hover{color:var(--t1)}

@keyframes ci{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.ai{animation:ci .6s var(--e) both}

// ===== OPC Platform  =====
function showNotification(msg,type='success'){
const n=document.createElement('div');
n.style.cssText='position:fixed;top:80px;right:20px;z-index:9999;background:'+(type==='success'?'#00d68f':type==='error'?'#ff6b6b':'#7c5cfc')+';color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fadeIn .3s';
n.textContent=msg;document.body.appendChild(n);setTimeout(()=>n.remove(),3000);
}
function toggleFavorite(id,type){
const k='opc-fav-'+type;let f=JSON.parse(localStorage.getItem(k)||'[]');
const i=f.indexOf(id);if(i>-1){f.splice(i,1);showNotification('');}else{f.push(id);showNotification('');}
localStorage.setItem(k,JSON.stringify(f));
}
function shareContent(title,url){
if(navigator.share){navigator.share({title,url});}else{navigator.clipboard.writeText(url);showNotification('');}
}
function showModal(c){
const m=document.createElement('div');m.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:20px';
m.innerHTML='<div style="background:#111119;border-radius:16px;padding:32px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto"><div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button onclick="this.closest(\'[style*=fixed]\').remove()" style="background:none;border:none;color:#9191a8;font-size:24px;cursor:pointer">×</button></div>'+c+'</div>';
document.body.appendChild(m);
}
function saveUserData(k,d){localStorage.setItem('opc-'+k,JSON.stringify(d));}
function getUserData(k){return JSON.parse(localStorage.getItem('opc-'+k)||'null');}
function validateForm(fid){const f=document.getElementById(fid);if(!f)return false;let v=true;f.querySelectorAll('[required]').forEach(e=>{if(!e.value.trim()){e.style.borderColor='#ff6b6b';v=false;}else{e.style.borderColor='';}});return v;}
