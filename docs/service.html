<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPC — </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{--bg:#06060a;--bg2:#0d0d14;--card:#111119;--card2:#16161f;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--t1:#e8e8f0;--t2:#9898b0;--t3:#5a5a72;--green:#00d68f;--blue:#4ea8de;--purple:#a78bfa;--orange:#ff8a50;--gold:#f0c040;--red:#ff6b6b;--pink:#fd79a8;--fd:'Space Grotesk',-apple-system,sans-serif;--fb:'Inter',-apple-system,sans-serif;--r:16px;--e:cubic-bezier(0.16,1,0.3,1)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);line-height:1.6;overflow-x:hidden}
.c{max-width:1280px;margin:0 auto;padding:0 32px;position:relative;z-index:1}

.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:rgba(15,15,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.08)}
.nav-i{max-width:1120px;margin:0 auto;padding:0 28px;height:100%;display:flex;align-items:center}
.nav-l{display:flex;align-items:center;gap:9px;font-weight:500;font-size:14px;color:#a0a0b8;margin-right:auto}
.nav-l .d{color:var(--green)}
.nav-lks{display:flex;align-items:center;gap:4px}
.nav-lk{padding:6px 10px;color:#606078;font-size:12px;font-weight:400;transition:color .2s;letter-spacing:.02em}
.nav-lk:hover{color:#9090a8}
.nav-lk.a{color:var(--green);background:rgba(0,214,143,.1)}
/* Hero */
.hero{padding:100px 24px 60px;text-align:center;position:relative}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(0,214,143,.08),transparent 70%)}
.hero h1{font-family:var(--fd);font-size:clamp(2rem,4vw,3rem);font-weight:700;margin-bottom:16px}
.hero h1 span{background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--t2);max-width:600px;margin:0 auto}
/* AI Assistant */
.ai-section{padding:40px 0}
.ai-card{max-width:800px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.ai-header{padding:24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px}
.ai-avatar{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:1.8rem}
.ai-info h3{font-family:var(--fd);font-size:1.2rem;margin-bottom:4px}
.ai-info p{font-size:.82rem;color:var(--green)}
.ai-chat{padding:24px;min-height:300px;max-height:400px;overflow-y:auto}
.ai-msg{margin-bottom:16px;display:flex;gap:12px}
.ai-msg.bot .bubble{background:var(--bg2);border:1px solid var(--border);border-radius:12px 12px 12px 4px;padding:12px 16px;max-width:80%}
.ai-msg.user{flex-direction:row-reverse}
.ai-msg.user .bubble{background:linear-gradient(135deg,var(--green),var(--blue));color:#000;border-radius:12px 12px 4px 12px;padding:12px 16px;max-width:80%;font-weight:500}
.ai-input-area{padding:16px 24px;border-top:1px solid var(--border)}
.ai-quick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.aq{padding:6px 14px;border-radius:100px;background:rgba(0,214,143,.08);border:1px solid rgba(0,214,143,.15);color:var(--green);font-size:.78rem;cursor:pointer;transition:all .2s}
.aq:hover{background:rgba(0,214,143,.15)}
.ai-input{display:flex;gap:12px}
.ai-input input{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--t1);padding:12px 16px;border-radius:12px;font-size:.88rem;font-family:var(--fb);outline:none}
.ai-input input:focus{border-color:var(--green)}
.ai-input button{background:linear-gradient(135deg,var(--green),var(--blue));border:none;color:#000;padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer}
/* Services Grid */
.services{padding:60px 0}
.s-title{font-family:var(--fd);font-size:1.8rem;font-weight:700;text-align:center;margin-bottom:8px}
.s-desc{color:var(--t2);text-align:center;margin-bottom:40px}
.s-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.s-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all .3s var(--e);cursor:pointer}
.s-card:hover{border-color:var(--border2);transform:translateY(-4px)}
.s-icon{font-size:2.5rem;margin-bottom:12px}
.s-name{font-family:var(--fd);font-size:1.1rem;font-weight:600;margin-bottom:8px}
.s-desc2{font-size:.82rem;color:var(--t2);line-height:1.5;margin-bottom:12px}
.s-tags{display:flex;gap:4px;flex-wrap:wrap}
.st{font-size:.68rem;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.04);color:var(--t3)}
/* Events */
.events{padding:60px 0}
.e-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.e-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;gap:16px;transition:all .3s var(--e)}
.e-card:hover{border-color:var(--border2)}
.e-date{width:60px;text-align:center;flex-shrink:0}
.e-day{font-family:var(--fd);font-size:2rem;font-weight:700;color:var(--green)}
.e-month{font-size:.72rem;color:var(--t3)}
.e-info h4{font-size:.95rem;margin-bottom:4px}
.e-info p{font-size:.82rem;color:var(--t2);margin-bottom:8px}
.e-meta{display:flex;gap:8px;font-size:.72rem;color:var(--t3)}
/* Footer */
footer{border-top:1px solid var(--border);padding:40px 0;text-align:center}
footer p{color:var(--t3);font-size:.82rem}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.ai{animation:fu .6s var(--e) both}

@media(max-width:768px){.nav-lks{display:flex;align-items:center;gap:4px}.s-grid,.e-grid{grid-template-columns:1fr}.hero h1{font-size:1.8rem}}
a{text-decoration:none;color:inherit}</style>

function sendMsg(){
const input=document.getElementById('aiInput');
const msg=input.value.trim();
if(!msg)return;
input.value='';

const chat=document.getElementById('aiChat');
chat.innerHTML+=`<div class="ai-msg user"><div class="bubble">${msg}</div></div>`;
chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{
let response="\n\n";
for(const[key,ans] of Object.entries(AI_RESPONSES)){
if(msg.includes(key)){
response=ans;
break;
}
}

response+="\n• \n• \n• \n• \n• \n\n";
}
chat.innerHTML+=`<div class="ai-msg bot"><div class="bubble">${response.replace(/\n/g,'<br>')}</div></div>`;

},800);
}

// ===== OPC Platform  =====
function showNotification(msg,type='success'){
const n=document.createElement('div');
n.style.cssText='position:fixed;top:80px;right:20px;z-index:9999;background:'+(type==='success'?'#00d68f':type==='error'?'#ff6b6b':'#7c5cfc')+';color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fadeIn .3s';
n.textContent=msg;document.body.appendChild(n);setTimeout(()=>n.remove(),3000);
}
function toggleFavorite(id,type){
const k='opc-fav-'+type;let f=JSON.parse(localStorage.getItem(k)||'[]');
const i=f.indexOf(id);if(i>-1){f.splice(i,1);showNotification('');}else{f.push(id);showNotification('');}
localStorage.setItem(k,JSON.stringify(f));
}
function shareContent(title,url){
if(navigator.share){navigator.share({title,url});}else{navigator.clipboard.writeText(url);showNotification('');}
}
function showModal(c){
const m=document.createElement('div');m.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:20px';
m.innerHTML='<div style="background:#111119;border-radius:16px;padding:32px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto"><div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button onclick="this.closest(\'[style*=fixed]\').remove()" style="background:none;border:none;color:#9191a8;font-size:24px;cursor:pointer">×</button></div>'+c+'</div>';
document.body.appendChild(m);
}
function saveUserData(k,d){localStorage.setItem('opc-'+k,JSON.stringify(d));}
function getUserData(k){return JSON.parse(localStorage.getItem('opc-'+k)||'null');}
function validateForm(fid){const f=document.getElementById(fid);if(!f)return false;let v=true;f.querySelectorAll('[required]').forEach(e=>{if(!e.value.trim()){e.style.borderColor='#ff6b6b';v=false;}else{e.style.borderColor='';}});return v;}

</script>
