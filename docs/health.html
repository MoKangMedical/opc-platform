<style>
:root{--bg:#06060a;--bg2:#0d0d14;--card:#111119;--card2:#16161f;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--t1:#e8e8f0;--t2:#9898b0;--t3:#5a5a72;--green:#00d68f;--green2:#10b981;--gold:#f0c040;--red:#ff6b6b;--blue:#4ea8de;--purple:#a78bfa;--fd:'Space Grotesk',-apple-system,sans-serif;--fb:'Inter',-apple-system,sans-serif;--r:16px;--e:cubic-bezier(0.16,1,0.3,1)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);line-height:1.6;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-repeat:repeat;opacity:.4}
.c{max-width:1280px;margin:0 auto;padding:0 32px;position:relative;z-index:1}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(6,6,10,.8);backdrop-filter:blur(24px) saturate(1.5);border-bottom:1px solid var(--border)}
.nav-i{max-width:1280px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-l{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--t1);font-family:var(--fd);font-weight:700;font-size:1.1rem;letter-spacing:-.02em}
.nav-l .d{color:var(--green)}
.nav-lks{display:flex;align-items:center;gap:32px}
.nav-lk{text-decoration:none;color:var(--t3);font-size:.875rem;font-weight:500;transition:color .2s;position:relative}
.nav-lk:hover{color:var(--t1)}.nav-lk.a{color:var(--t1)}.nav-lk.a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:2px;background:var(--green);border-radius:1px}
.lbtn{background:rgba(255,255,255,.02);border:1px solid var(--border);color:var(--t2);padding:6px 14px;border-radius:8px;font-size:.8rem;cursor:pointer;transition:all .2s}
.hero{min-height:60vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:140px 24px 60px}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(0,214,143,.08),transparent 70%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(16,185,129,.04),transparent 60%)}
.hero-c{text-align:center;max-width:860px;position:relative;z-index:1}
.badge{display:inline-flex;align-items:center;gap:8px;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--green);background:rgba(0,214,143,.08);border:1px solid rgba(0,214,143,.15);padding:8px 20px;border-radius:100px;margin-bottom:28px;animation:fu .8s var(--e) both}
.badge .p{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.ht{font-family:var(--fd);font-size:clamp(2.5rem,5.5vw,4rem);font-weight:700;line-height:1.08;margin-bottom:24px;letter-spacing:-.03em;animation:fu .8s var(--e) .1s both}
.ht .g{background:linear-gradient(135deg,var(--green),var(--green2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd{font-size:1.15rem;color:var(--t2);max-width:640px;margin:0 auto 48px;line-height:1.7;animation:fu .8s var(--e) .2s both}
/* Dashboard */
.dash{display:grid;grid-template-columns:200px 1fr;gap:32px;max-width:900px;margin:0 auto 48px;animation:fu .8s var(--e) .3s both}
.score-ring{position:relative;width:180px;height:180px;margin:0 auto}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring .val-n{font-family:var(--fd);font-size:3rem;font-weight:700;color:var(--green)}
.score-ring .val-l{font-size:.8rem;color:var(--t3)}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.met{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px}
.met-icon{font-size:1.5rem;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border-radius:10px}
.met-v{font-family:var(--fd);font-size:1.2rem;font-weight:600}
.met-l{font-size:.75rem;color:var(--t3)}
.streak{text-align:center;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:48px;animation:fu .8s var(--e) .4s both}
.streak-n{font-family:var(--fd);font-size:2.5rem;font-weight:700;color:var(--gold)}
.streak-l{font-size:.85rem;color:var(--t2)}
/* Tabs */
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:40px;flex-wrap:wrap}
.tab{background:var(--card);border:1px solid var(--border);color:var(--t2);padding:10px 24px;border-radius:12px;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .3s var(--e);font-family:var(--fb)}
.tab:hover{border-color:var(--border2);color:var(--t1)}
.tab.a{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 4px 16px rgba(0,214,143,.25)}
.tpc{display:none}.tpc.a{display:block}
/* Checkin form */
.form{max-width:560px;margin:0 auto}
.fg{margin-bottom:20px}
.fl{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.fl span{font-size:.9rem;font-weight:500}
.fl .v{font-family:var(--fd);font-weight:600;color:var(--green)}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--border);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--green);cursor:pointer;box-shadow:0 2px 8px rgba(0,214,143,.3)}
input[type=number],input[type=text]{width:100%;background:var(--card);border:1px solid var(--border);color:var(--t1);padding:12px 16px;border-radius:10px;font-size:.95rem;font-family:var(--fb);outline:none;transition:border-color .2s}
input[type=number]:focus,input[type=text]:focus{border-color:var(--green)}
textarea{width:100%;background:var(--card);border:1px solid var(--border);color:var(--t1);padding:12px 16px;border-radius:10px;font-size:.95rem;font-family:var(--fb);outline:none;resize:vertical;min-height:80px}
.btn{background:var(--green);border:none;color:#fff;padding:14px 32px;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .25s var(--e);font-family:var(--fb);width:100%}
.btn:hover{box-shadow:0 8px 32px rgba(0,214,143,.3);transform:translateY(-2px)}
/* Sports */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .3s var(--e)}
.sc:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.sc-icon{font-size:2rem;margin-bottom:8px}
.sc-name{font-size:.85rem;font-weight:500;margin-bottom:4px}
.sc-cal{font-size:.72rem;color:var(--t3)}
.sc.active{border-color:var(--green);background:rgba(0,214,143,.06)}
/* Challenge */
.ch-list{max-width:640px;margin:0 auto}
.ch{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:16px}
.ch-icon{font-size:1.5rem;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border-radius:10px;flex-shrink:0}
.ch-info{flex:1}
.ch-title{font-weight:600;margin-bottom:4px;font-size:.95rem}
.ch-desc{font-size:.82rem;color:var(--t2);margin-bottom:8px}
.ch-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.ch-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--green2))}
.ch-pct{font-family:var(--fd);font-weight:600;color:var(--green);font-size:.9rem;flex-shrink:0}
/* Leaderboard */
.lb{max-width:560px;margin:0 auto}
.lb-row{display:flex;align-items:center;gap:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.lb-rank{font-family:var(--fd);font-size:1.2rem;font-weight:700;width:32px;text-align:center}
.lb-rank.g{color:var(--gold)}.lb-rank.s{color:#c0c0c0}.lb-rank.b{color:#cd7f32}
.lb-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;background:rgba(255,255,255,.06)}
.lb-name{flex:1;font-weight:500}
.lb-pts{font-family:var(--fd);font-weight:600;color:var(--green)}
/* Achievements */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.ac{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px 16px;text-align:center;transition:all .3s var(--e)}
.ac:hover{transform:translateY(-2px)}
.ac.locked{opacity:.4;filter:grayscale(1)}
.ac-icon{font-size:2.5rem;margin-bottom:8px}
.ac-name{font-size:.85rem;font-weight:600;margin-bottom:4px}
.ac-desc{font-size:.72rem;color:var(--t3)}
footer{border-top:1px solid var(--border);padding:48px 0;position:relative;z-index:1}
.ft-i{max-width:1280px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between}
.ft-t{color:var(--t3);font-size:.82rem}
.ft-l{display:flex;gap:24px}
.ft-l a{color:var(--t3);text-decoration:none;font-size:.82rem;transition:color .2s}
.ft-l a:hover{color:var(--t1)}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
@keyframes ci{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.ai{animation:ci .6s var(--e) both}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
@media(max-width:768px){.dash{grid-template-columns:1fr}.metrics{grid-template-columns:1fr}.sg{grid-template-columns:repeat(3,1fr)}.nav-lks{gap:16px}.nav-lk{font-size:.8rem}.ht{font-size:2rem}.c{padding:0 16px}.ag{grid-template-columns:repeat(2,1fr)}}
.mmb{display:none;background:none;border:none;color:var(--t1);font-size:1.4rem;cursor:pointer}
@media(max-width:640px){.nav-lks{display:none}.mmb{display:block}.nav-lks.open{display:flex;flex-direction:column;position:absolute;top:64px;left:0;right:0;background:rgba(6,6,10,.98);padding:20px 32px;gap:16px;border-bottom:1px solid var(--border)}}
</style>
