    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06060a;
            --bg-elevated: #0d0d14;
            --bg-card: #111119;
            --bg-card-hover: #16161f;
            --bg-surface: rgba(255,255,255,0.02);
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
            --text: #e8e8f0;
            --text-secondary: #9898b0;
            --text-muted: #5a5a72;
            --accent: #e74c3c;
            --accent-light: #ff6b6b;
            --accent-warm: #ff8a50;
            --green: #00d68f;
            --blue: #4ea8de;
            --purple: #a78bfa;
            --gold: #f0c040;
            --font-display: 'Space Grotesk', -apple-system, sans-serif;
            --font-body: 'Inter', -apple-system, sans-serif;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-lg: 24px;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --duration: 0.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== Noise Texture ===== */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            background-repeat: repeat; opacity: 0.4;
        }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

        /* ===== Navigation ===== */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;

            background: rgba(6, 6, 10, 0.8); backdrop-filter: blur(24px) saturate(1.5);
            border-bottom: 1px solid var(--border);
            transition: background 0.3s;
        }
        .nav-inner {
            max-width: 1280px; margin: 0 auto; padding: 0 32px;
            height: 64px; display: flex; align-items: center; justify-content: space-between;
        }
        .nav-logo {
            display: flex; align-items: center; gap: 10px; text-decoration: none;
            color: var(--text); font-family: var(--font-display); font-weight: 700; font-size: 1.1rem;
            letter-spacing: -0.02em;
        }
        .nav-logo .dot { color: var(--accent); }
        .nav-links { display: flex; align-items: center; gap: 32px; }
        .nav-link {
            text-decoration: none; color: var(--text-muted); font-size: 0.875rem;
            font-weight: 500; transition: color 0.2s; position: relative;
        }
        .nav-link:hover { color: var(--text); }
        .nav-link.active { color: var(--text); }
        .nav-link.active::after {
            content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
            height: 2px; background: var(--accent); border-radius: 1px;
        }
        .lang-btn {
            background: var(--bg-surface); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 6px 14px; border-radius: 8px;
            font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
        }
        .lang-btn:hover { border-color: var(--border-hover); color: var(--text); }

        /* ===== Hero ===== */
        .hero {
            min-height: 70vh; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; padding: 140px 24px 80px;
        }
        .hero::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(231,76,60,0.08), transparent 70%),
                        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255,138,80,0.04), transparent 60%);
        }
        .hero-content { text-align: center; max-width: 860px; position: relative; z-index: 1; }

        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
            color: var(--accent-light); background: rgba(231,76,60,0.08);
            border: 1px solid rgba(231,76,60,0.15); padding: 8px 20px;
            border-radius: 100px; margin-bottom: 28px;
            animation: fadeUp 0.8s var(--ease) both;
        }
        .hero-badge .pulse {
            width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
            animation: pulse 2s infinite;
        }

        .hero-title {
            font-family: var(--font-display); font-size: clamp(2.5rem, 5.5vw, 4rem);
            font-weight: 700; line-height: 1.08; margin-bottom: 24px;
            letter-spacing: -0.03em;
            animation: fadeUp 0.8s var(--ease) 0.1s both;
        }
        .hero-title .gradient {
            background: linear-gradient(135deg, var(--accent-light), var(--accent-warm));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero-desc {
            font-size: 1.15rem; color: var(--text-secondary); max-width: 640px;
            margin: 0 auto 48px; line-height: 1.7;
            animation: fadeUp 0.8s var(--ease) 0.2s both;
        }

        /* ===== Stats Row ===== */
        .stats-row {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
            background: var(--border); border-radius: var(--radius); overflow: hidden;
            max-width: 720px; margin: 0 auto 48px;
            animation: fadeUp 0.8s var(--ease) 0.3s both;
        }
        .stat-cell {
            background: var(--bg-elevated); padding: 28px 20px; text-align: center;
            transition: background 0.3s;
        }
        .stat-cell:hover { background: var(--bg-card-hover); }
        .stat-number {
            font-family: var(--font-display); font-size: 2.2rem; font-weight: 700;
            letter-spacing: -0.03em; margin-bottom: 4px;
        }
        .stat-number.red { color: var(--accent-light); }
        .stat-number.gold { color: var(--gold); }
        .stat-number.blue { color: var(--blue); }
        .stat-number.green { color: var(--green); }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }

        .hero-cta {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--accent); color: #fff; text-decoration: none;
            padding: 14px 32px; border-radius: 12px; font-weight: 600; font-size: 0.95rem;
            transition: all 0.3s var(--ease); border: none; cursor: pointer;
            animation: fadeUp 0.8s var(--ease) 0.4s both;
        }
        .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(231,76,60,0.3); }

        /* ===== Filter Section ===== */
        .filter-section {
            padding: 0 0 48px; position: relative; z-index: 10;
        }
        .filter-bar {
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
            justify-content: center; margin-bottom: 20px;
        }
        .filter-btn {
            background: var(--bg-surface); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 8px 18px; border-radius: 100px;
            font-size: 0.82rem; font-weight: 500; cursor: pointer;
            transition: all 0.25s var(--ease); font-family: var(--font-body);
        }
        .filter-btn:hover { border-color: var(--border-hover); color: var(--text); background: var(--bg-card); }
        .filter-btn.active {
            background: var(--accent); border-color: var(--accent); color: #fff;
            box-shadow: 0 4px 16px rgba(231,76,60,0.25);
        }

        .search-bar {
            max-width: 520px; margin: 0 auto; position: relative;
        }
        .search-bar input {
            width: 100%; background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text); padding: 14px 20px 14px 48px; border-radius: 14px;
            font-size: 0.95rem; font-family: var(--font-body); outline: none;
            transition: all 0.3s;
        }
        .search-bar input::placeholder { color: var(--text-muted); }
        .search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(231,76,60,0.1); }
        .search-bar .icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 1.1rem;
        }
        .search-bar .count {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 0.8rem; font-weight: 500;
        }

        /* ===== Project Grid ===== */
        .projects-section { padding: 0 0 80px; }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 32px;
        }
        .section-title {
            font-family: var(--font-display); font-size: 1.6rem; font-weight: 700;
            letter-spacing: -0.02em;
        }
        .section-count {
            font-size: 0.85rem; color: var(--text-muted);
            background: var(--bg-surface); padding: 6px 14px; border-radius: 8px;
            border: 1px solid var(--border);
        }

        .projects-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }

        /* ===== Project Card ===== */
        .project-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 28px; position: relative;
            transition: all 0.4s var(--ease); overflow: hidden;
        }
        .project-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-warm));
            opacity: 0; transition: opacity 0.3s;
        }
        .project-card:hover {
            border-color: var(--border-hover); transform: translateY(-4px);
            box-shadow: 0 12px 48px rgba(0,0,0,0.3);
        }
        .project-card:hover::before { opacity: 1; }

        .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
        .card-company {
            font-size: 0.78rem; color: var(--text-muted); font-weight: 500;
            display: flex; align-items: center; gap: 6px;
        }
        .card-badge {
            font-size: 0.68rem; padding: 3px 10px; border-radius: 6px;
            font-weight: 600; letter-spacing: 0.5px;
        }
        .badge-featured {
            background: rgba(231,76,60,0.12); color: var(--accent-light); border: 1px solid rgba(231,76,60,0.2);
        }
        .badge-hot {
            background: rgba(240,192,64,0.12); color: var(--gold); border: 1px solid rgba(240,192,64,0.2);
        }

        .card-title {
            font-family: var(--font-display); font-size: 1.1rem; font-weight: 600;
            line-height: 1.4; margin-bottom: 12px; letter-spacing: -0.01em;
            color: var(--text);
        }
        .card-desc {
            font-size: 0.88rem; color: var(--text-secondary); line-height: 1.65;
            margin-bottom: 20px;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }

        .card-meta {
            display: flex; align-items: center; gap: 16px; margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .meta-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.8rem; color: var(--text-muted);
        }
        .meta-item .label { color: var(--text-muted); }
        .meta-item .value { color: var(--text-secondary); font-weight: 500; }
        .meta-item .value.budget { color: var(--gold); font-weight: 600; }
        .meta-item .value.deadline { color: var(--accent-light); }

        .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
        .tag {
            font-size: 0.72rem; padding: 4px 10px; border-radius: 6px;
            background: rgba(255,255,255,0.04); color: var(--text-muted);
            border: 1px solid var(--border); font-weight: 500;
        }

        .card-actions { display: flex; gap: 10px; }
        .btn-detail {
            flex: 1; background: var(--bg-surface); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 10px 16px; border-radius: 10px;
            font-size: 0.82rem; font-weight: 500; cursor: pointer;
            transition: all 0.2s; text-align: center; text-decoration: none;
            font-family: var(--font-body);
        }
        .btn-detail:hover { border-color: var(--border-hover); color: var(--text); }
        .btn-apply {
            flex: 1; background: var(--accent); border: none;
            color: #fff; padding: 10px 16px; border-radius: 10px;
            font-size: 0.82rem; font-weight: 600; cursor: pointer;
            transition: all 0.25s var(--ease); text-align: center; text-decoration: none;
            font-family: var(--font-body);
        }
        .btn-apply:hover { box-shadow: 0 4px 16px rgba(231,76,60,0.3); transform: translateY(-1px); }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center; padding: 80px 20px;
            color: var(--text-muted); font-size: 1rem;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }

        /* ===== Footer ===== */
        .footer {
            border-top: 1px solid var(--border); padding: 48px 0;
            position: relative; z-index: 1;
        }
        .footer-inner {
            max-width: 1280px; margin: 0 auto; padding: 0 32px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .footer-text { color: var(--text-muted); font-size: 0.82rem; }
        .footer-links { display: flex; gap: 24px; }
        .footer-links a {
            color: var(--text-muted); text-decoration: none; font-size: 0.82rem;
            transition: color 0.2s;
        }
        .footer-links a:hover { color: var(--text); }

        /* ===== Animations ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in { animation: cardIn 0.6s var(--ease) both; }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .projects-grid { grid-template-columns: 1fr; }
            .nav-links { gap: 16px; }
            .nav-link { font-size: 0.8rem; }
            .hero-title { font-size: 2rem; }
            .filter-bar { gap: 8px; }
            .filter-btn { padding: 6px 14px; font-size: 0.78rem; }
            .container { padding: 0 16px; }
        }

        /* Mobile nav */
        .mobile-menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 1.4rem; cursor: pointer; }
        @media (max-width: 640px) {
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; }
            .nav-links.open { display: flex; flex-direction: column; position: absolute; top: 64px; left: 0; right: 0; background: rgba(6,6,10,0.98); padding: 20px 32px; gap: 16px; border-bottom: 1px solid var(--border); }
        }
    a{text-decoration:none;color:inherit}</style>
</head>

        {id:30,title:"AI+",company:"",category:"",desc:"AIAI",budget:"¥350",budgetMin:350,deadline:"2026-05-25",tags:["","",""],contact:""}
    ];

    // Categories
    const CATEGORIES = ['',...new Set(PROJECTS.map(p=>p.category))];

    const CAT_ICONS = {'':'','':'','':'','':'','':'','':'','':'','':'','':'','':'','':'','':'','':'🧪','':'','':'','':'','':''};

    let currentFilter = '';
    let searchTerm = '';

    // ===== Render Filter Bar =====
    function renderFilters() {
        const bar = document.getElementById('filterBar');
        bar.innerHTML = CATEGORIES.map(cat => {
            const count = cat === '' ? PROJECTS.length : PROJECTS.filter(p => p.category === cat).length;
            const icon = CAT_ICONS[cat] || '';
            return `<button class="filter-btn ${cat === currentFilter ? 'active' : ''}" onclick="filterBy('${cat}')">${icon} ${cat} (${count})</button>`;
        }).join('');
    }

    // ===== Render Projects =====
    function renderProjects() {
        const grid = document.getElementById('projectsGrid');
        const empty = document.getElementById('emptyState');
        const countEl = document.getElementById('projectCount');
        const searchCountEl = document.getElementById('searchCount');

        let filtered = PROJECTS;
        if (currentFilter !== '') filtered = filtered.filter(p => p.category === currentFilter);
        if (searchTerm) {
            const s = searchTerm.toLowerCase();
            filtered = filtered.filter(p =>
                p.title.toLowerCase().includes(s) ||
                p.company.toLowerCase().includes(s) ||
                p.tags.some(t => t.toLowerCase().includes(s)) ||
                p.category.toLowerCase().includes(s)
            );
        }

        countEl.textContent = `${filtered.length} `;
        searchCountEl.textContent = searchTerm ? `${filtered.length} ` : '';

        if (filtered.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        grid.innerHTML = filtered.map((p, i) => {
            const deadlineDate = new Date(p.deadline);
            const now = new Date();
            const daysLeft = Math.ceil((deadlineDate - now) / (1000 * 60 * 60 * 24));
            const deadlineText = daysLeft > 0 ? `${daysLeft}` : '';
            const deadlineColor = daysLeft <= 10 ? 'color: #ff6b6b;' : daysLeft <= 30 ? 'color: #f0c040;' : '';

            return `
            <div class="project-card animate-in" style="animation-delay: ${i * 0.05}s">
                <div class="card-header">
                    <span class="card-company"> ${p.company.replace(/(|)/g,'')}</span>
                    ${p.featured ? '<span class="card-badge badge-featured"></span>' : ''}

                    ${p.hot ? '<span class="card-badge badge-hot"> </span>' : ''}
                </div>
                <h3 class="card-title">${p.title}</h3>
                <p class="card-desc">${p.desc}</p>
                <div class="card-meta">
                    <div class="meta-item"><span class="label"></span> <span class="value budget">${p.budget}</span></div>
                    <div class="meta-item"><span class="label"></span> <span class="value deadline" style="${deadlineColor}">${daysLeft > 0 ? deadlineText : ''}</span></div>
                    <div class="meta-item"><span class="label"></span> <span class="value">${p.contact}</span></div>
                </div>
                <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                <div class="card-actions">
                    <button class="btn-detail" onclick="showDetail(${p.id})"></button>
                    <button class="btn-apply"> →</button>
                </div>
            </div>`;
        }).join('');
    }

    function filterBy(cat) {
        currentFilter = cat;
        renderFilters();
        renderProjects();
    }

    function showDetail(id) {
        const p = PROJECTS.find(x => x.id === id);
        if (!p) return;

        alert(` ${p.title}\n\n ${p.company}\n : ${p.budget}\n : ${p.deadline}\n : ${p.contact}\n : ${p.tags.join(', ')}\n\n${p.desc}`);
    }

    // ===== Search =====
    document.getElementById('searchInput').addEventListener('input', function(e) {
        searchTerm = e.target.value;
        renderProjects();
    });

    // ===== i18n =====
    let lang = localStorage.getItem('opc-lang') || 'zh';
    function toggleLang() {
        lang = lang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('opc-lang', lang);
        applyLang();
    }
    function applyLang() {
        document.querySelectorAll('[data-en]').forEach(el => {
            el.textContent = lang === 'en' ? el.dataset.en : el.getAttribute('data-zh') || el.textContent;
        });
        // Save original zh text
        document.querySelectorAll('[data-en]').forEach(el => {
            if (!el.dataset.zh) el.dataset.zh = el.textContent;
        });
        // Swap
        document.querySelectorAll('[data-en]').forEach(el => {
            const orig = el.dataset.zh;
            const en = el.dataset.en;
            el.textContent = lang === 'en' ? en : orig;
        });
    }

    // ===== Init =====
    renderFilters();
    renderProjects();

function showNotification(msg,type='success'){
const n=document.createElement('div');
n.style.cssText='position:fixed;top:80px;right:20px;z-index:9999;background:'+(type==='success'?'#00d68f':type==='error'?'#ff6b6b':'#7c5cfc')+';color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fadeIn .3s';
n.textContent=msg;document.body.appendChild(n);setTimeout(()=>n.remove(),3000);
}
function toggleFavorite(id,type){
const k='opc-fav-'+type;let f=JSON.parse(localStorage.getItem(k)||'[]');
const i=f.indexOf(id);if(i>-1){f.splice(i,1);showNotification('');}else{f.push(id);showNotification('');}
localStorage.setItem(k,JSON.stringify(f));
}
function shareContent(title,url){
if(navigator.share){navigator.share({title,url});}else{navigator.clipboard.writeText(url);showNotification('');}
}
function showModal(c){
const m=document.createElement('div');m.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:20px';
m.innerHTML='<div style="background:#111119;border-radius:16px;padding:32px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto"><div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button onclick="this.closest(\'[style*=fixed]\').remove()" style="background:none;border:none;color:#9191a8;font-size:24px;cursor:pointer">×</button></div>'+c+'</div>';
document.body.appendChild(m);
}
function saveUserData(k,d){localStorage.setItem('opc-'+k,JSON.stringify(d));}
function getUserData(k){return JSON.parse(localStorage.getItem('opc-'+k)||'null');}
function validateForm(fid){const f=document.getElementById(fid);if(!f)return false;let v=true;f.querySelectorAll('[required]').forEach(e=>{if(!e.value.trim()){e.style.borderColor='#ff6b6b';v=false;}else{e.style.borderColor='';}});return v;}

</script>
